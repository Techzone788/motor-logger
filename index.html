<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Motor Usage Logger</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; padding: 20px; margin: 0; }
    .card { background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); padding: 24px; margin-bottom: 24px; max-width: 800px; margin-left: auto; margin-right: auto; }
    h1 { color: #1e40af; text-align: center; }
    label { display: block; margin: 16px 0 6px; font-weight: 600; color: #374151; }
    input, select { width: 100%; padding: 14px; border: 2px solid #e5e7eb; border-radius: 12px; font-size: 16px; }
    button { background: #2563eb; color: white; padding: 16px; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; width: 100%; margin-top: 10px; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    .success { background: #d1fae5; color: #065f46; padding: 16px; border-radius: 12px; text-align: center; }
    .error { background: #fee2e2; color: #b91c1c; padding: 16px; border-radius: 12px; text-align: center; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
    th { background: #f1f5f9; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Motor Usage Logger</h1>
    <p style="text-align:center; color:#64748b;">Google Sheets Connected</p>
  </div>

  <!-- Admin Login -->
  <div id="adminLogin" class="card">
    <h2>🔐 Admin Dashboard</h2>
    <label>Enter Admin Password</label>
    <input type="password" id="adminPass" placeholder="Enter password">
    <button onclick="loginAdmin()">Login as Admin</button>
  </div>

  <!-- Generator -->
  <div id="generator" class="card hidden">
    <h2>Generate Motor QR Code</h2>
    <input type="text" id="generateMotorId" value="Motor-A1">
    <button onclick="generateMotorQR()">Generate QR Code</button>
    <div id="generateQR" style="margin-top:20px; text-align:center;"></div>
  </div>

  <!-- Worker Form -->
  <div id="logger" class="card hidden">
    <h2>New Log Entry</h2>
    <label>Motor ID</label>
    <input type="text" id="motorId" readonly>

    <label>Worker Name</label>
    <input type="text" id="loggedWorker" placeholder="Enter your full name">

    <label>Motor Power</label>
    <input type="number" id="power" step="0.01" min="0.01">

    <label>Unit</label>
    <select id="unit">
      <option value="kW">kW</option>
      <option value="HP">HP</option>
    </select>

    <label>Hour Meter Reading</label>
    <input type="number" id="hourMeter" step="0.1" min="0">

    <label>Usage Percentage (%)</label>
    <input type="number" id="usage" min="0" max="100">

    <button onclick="saveLog()">Save Log Entry</button>
    <div id="status"></div>
  </div>

  <!-- Admin Dashboard -->
  <div id="adminDashboard" class="card hidden">
    <h2>📊 All Logs</h2>
    <button onclick="exportToExcel()" style="background:#16a34a; width:auto; display:inline-block; margin-bottom:15px;">Download Excel</button>
    <button onclick="logoutAdmin()" style="background:#ef4444; width:auto; display:inline-block; margin-bottom:15px;">Logout</button>
    <div id="logsTable"></div>
  </div>

  <script>
    const baseUrl = "https://techzone788.github.io/motor-logger";
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzAHB4DzFOY1fddnCNj1l16YUDkcWqtNpdlUYxthZU9VCoSIijsrvJc3kib0SuFF5FUfA/exec";
    const ADMIN_PASSWORD = "admin123";   // ← Change this to your preferred password

    let allLogs = [];

    const urlParams = new URLSearchParams(window.location.search);
    const motorFromQR = urlParams.get('motor');

    if (motorFromQR) {
      document.getElementById('adminLogin').classList.add('hidden');
      document.getElementById('logger').classList.remove('hidden');
      document.getElementById('motorId').value = decodeURIComponent(motorFromQR);
    }

    function loginAdmin() {
      const pass = document.getElementById('adminPass').value;
      if (pass === ADMIN_PASSWORD) {
        document.getElementById('adminLogin').classList.add('hidden');
        document.getElementById('generator').classList.remove('hidden');
        document.getElementById('adminDashboard').classList.remove('hidden');
        loadLogs();
      } else {
        alert("❌ Wrong Password");
      }
    }

    function logoutAdmin() {
      location.reload();
    }

    async function loadLogs() {
      // For now we show local logs. In future we can fetch from Google Sheet if needed.
      const container = document.getElementById('logsTable');
      container.innerHTML = `<p style="text-align:center; color:#666;">Loading logs from Google Sheet...</p>`;
      
      // Simple table for now (you can expand later)
      let html = `<table><tr><th>Date</th><th>Worker</th><th>Motor</th><th>Power</th><th>Hour Meter</th><th>Usage</th></tr>`;
      
      // You can improve this to fetch real-time from Google Sheet if you want
      html += `</table><p style="text-align:center; margin-top:20px; color:#666;">Check your Google Sheet for full data</p>`;
      
      container.innerHTML = html;
    }

    function generateMotorQR() {
      const motorId = document.getElementById('generateMotorId').value.trim();
      if (!motorId) return alert("Enter Motor ID");
      const fullUrl = `${baseUrl}?motor=${encodeURIComponent(motorId)}`;
      document.getElementById('generateQR').innerHTML = `<p><strong>QR for: ${motorId}</strong></p><div id="qrContainer"></div>`;
      new QRCode(document.getElementById("qrContainer"), { text: fullUrl, width: 280, height: 280 });
    }

    async function saveLog() {
      const worker = document.getElementById('loggedWorker').value.trim();
      if (!worker) return alert("Please enter your name");

      const data = {
        date: new Date().toLocaleString(),
        worker: worker,
        motorId: document.getElementById('motorId').value,
        power: document.getElementById('power').value,
        unit: document.getElementById('unit').value,
        hourMeter: document.getElementById('hourMeter').value,
        usage: document.getElementById('usage').value
      };

      try {
        await fetch(GOOGLE_SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify(data),
          headers: { 'Content-Type': 'application/json' }
        });

        document.getElementById('status').innerHTML = `<div class="success">✅ Saved to Google Sheets!</div>`;

        // Clear form
        document.getElementById('power').value = '';
        document.getElementById('hourMeter').value = '';
        document.getElementById('usage').value = '';
        document.getElementById('loggedWorker').value = '';
      } catch (e) {
        document.getElementById('status').innerHTML = `<div class="error">Error saving data</div>`;
      }
    }

    function exportToExcel() {
      alert("Please open your Google Sheet and download as Excel from there.\n\nThis is the safest and most reliable way.");
    }
  </script>
</body>
</html>
