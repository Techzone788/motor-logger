<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Motor Usage Logger</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    body { 
      font-family: 'Segoe UI', sans-serif; 
      background: #f8fafc; 
      padding: 20px; 
      margin: 0;
    }
    .card { 
      background: white; 
      border-radius: 16px; 
      box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
      padding: 24px; 
      margin: 20px auto; 
      max-width: 600px; 
    }
    h1 { color: #1e40af; text-align: center; }
    label { display: block; margin: 16px 0 6px; font-weight: 600; color: #374151; }
    input, select { 
      width: 100%; 
      padding: 14px; 
      border: 2px solid #e5e7eb; 
      border-radius: 12px; 
      font-size: 16px; 
    }
    button { 
      background: #2563eb; 
      color: white; 
      padding: 16px; 
      border: none; 
      border-radius: 12px; 
      font-size: 18px; 
      font-weight: bold; 
      width: 100%; 
      margin-top: 20px; 
      cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
    .success { background: #d1fae5; color: #065f46; padding: 16px; border-radius: 12px; }
    .error { background: #fee2e2; color: #b91c1c; padding: 16px; border-radius: 12px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- ADMIN LOGIN -->
  <div id="adminLogin" class="card">
    <h1>Motor Usage Logger</h1>
    <h2 style="text-align:center; margin:20px 0 15px;">🔐 Admin Login</h2>
    <input type="password" id="adminPass" placeholder="Enter Admin Password">
    <button onclick="loginAdmin()">Login as Admin</button>
    <p style="text-align:center; margin-top:15px; color:#666; font-size:14px;">
      Default Password: <strong>admin123</strong>
    </p>
  </div>

  <!-- QR GENERATOR (Admin) -->
  <div id="generator" class="card hidden">
    <h2>Generate Motor QR Code</h2>
    <input type="text" id="generateMotorId" value="Motor-A1">
    <button onclick="generateMotorQR()">Generate QR Code</button>
    <div id="generateQR" style="margin-top:20px; text-align:center;"></div>
  </div>

  <!-- WORKER LOG FORM -->
  <div id="logger" class="card hidden">
    <h2>📝 New Log Entry</h2>
    
    <label>Motor ID</label>
    <input type="text" id="motorId" readonly>

    <label>Worker Name</label>
    <input type="text" id="loggedWorker" placeholder="Enter your full name">

    <label>Motor Power</label>
    <input type="number" id="power" step="0.01" min="0.01" placeholder="15.5">

    <label>Unit</label>
    <select id="unit">
      <option value="kW">kW</option>
      <option value="HP">HP</option>
    </select>

    <label>Hour Meter Reading</label>
    <input type="number" id="hourMeter" step="0.1" min="0" placeholder="2456.5">

    <label>Usage Percentage (%)</label>
    <input type="number" id="usage" min="0" max="100" placeholder="85">

    <button onclick="saveLog()">Save Log Entry</button>
    <div id="status"></div>
  </div>

  <script>
    const baseUrl = "https://techzone788.github.io/motor-logger";
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzAHB4DzFOY1fddnCNj1l16YUDkcWqtNpdlUYxthZU9VCoSIijsrvJc3kib0SuFF5FUfA/exec";
    const ADMIN_PASSWORD = "admin123";

    // Detect if this is worker mode (QR scanned)
    const urlParams = new URLSearchParams(window.location.search);
    const motorFromQR = urlParams.get('motor');

    if (motorFromQR) {
      // WORKER MODE - Show ONLY logger form
      document.getElementById('adminLogin').classList.add('hidden');
      document.getElementById('generator').classList.add('hidden');
      document.getElementById('logger').classList.remove('hidden');
      document.getElementById('motorId').value = decodeURIComponent(motorFromQR);
    } 
    // Else: Show Admin Login by default

    function loginAdmin() {
      if (document.getElementById('adminPass').value === ADMIN_PASSWORD) {
        document.getElementById('adminLogin').classList.add('hidden');
        document.getElementById('generator').classList.remove('hidden');
      } else {
        alert("❌ Incorrect Password");
      }
    }

    function generateMotorQR() {
      const motorId = document.getElementById('generateMotorId').value.trim();
      if (!motorId) return alert("Enter Motor ID");
      
      const fullUrl = `${baseUrl}?motor=${encodeURIComponent(motorId)}`;
      document.getElementById('generateQR').innerHTML = 
        `<p><strong>QR for: ${motorId}</strong></p>
         <div id="qrContainer" style="margin:20px auto; display:inline-block;"></div>`;
      
      new QRCode(document.getElementById("qrContainer"), { text: fullUrl, width: 280, height: 280 });
    }

    async function saveLog() {
      const worker = document.getElementById('loggedWorker').value.trim();
      if (!worker) return alert("Please enter your name");

      const data = {
        date: new Date().toLocaleString(),
        worker: worker,
        motorId: document.getElementById('motorId').value,
        power: document.getElementById('power').value,
        unit: document.getElementById('unit').value,
        hourMeter: document.getElementById('hourMeter').value,
        usage: document.getElementById('usage').value
      };

      if (!data.power || !data.hourMeter || !data.usage) {
        alert("Please fill all fields");
        return;
      }

      try {
        await fetch(GOOGLE_SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify(data),
          headers: { 'Content-Type': 'application/json' }
        });

        document.getElementById('status').innerHTML = `<div class="success">✅ Log Saved Successfully!</div>`;

        // Clear form
        document.getElementById('power').value = '';
        document.getElementById('hourMeter').value = '';
        document.getElementById('usage').value = '';
        document.getElementById('loggedWorker').value = '';
      } catch(e) {
        document.getElementById('status').innerHTML = `<div class="error">Error saving. Try again.</div>`;
      }
    }
  </script>
</body>
</html>
